<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>

<style>
body {margin:0;font-family:Arial;background:#111;color:#fff;text-align:center;}
form {margin-top:80px;}
input {padding:10px;margin:10px;width:250px;}
button {padding:12px 25px;background:#e50914;color:#fff;border:none;border-radius:5px;}
</style>
</head>
<body>

<h2>Registro</h2>

<form onsubmit="handleSubmit(event)">
  <input type="text" placeholder="Nombre" required><br>
  <input type="email" placeholder="Email" required><br>
  <button type="submit">Enviar</button>
</form>

<script>
function handleSubmit(e){
  e.preventDefault();
  window.location.href="thankyou.html";
}
</script>

</body>
</html>
